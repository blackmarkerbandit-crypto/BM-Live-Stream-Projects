<!DOCTYPE html>
<html lang="en">
<head>

<title>East 116th Street — Tactical Festival Map</title>
<style>

    justify-content: flex-start;
    min-height: 100vh;
    padding: 24px;
    font-family: Arial, sans-serif;

  svg {
    max-width: 100%;
    height: auto;
    display: block;

  p {

</head>
<body>

<svg viewBox="0 0 1240 880" width="1240" height="880"

  </text>

  <!-- ═══════════════════════════════════════════════════════════ -->

  <line x1="156" y1="413" x2="360" y2="413"
        stroke="#60a5fa" stroke-width="2.5"
        stroke-dasharray="7,5" opacity="0.8"
        marker-end="url(#arrowBlue)"/>

  <text x="758" y="423" text-anchor="middle" font-size="8.5"
