<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BM Live Chat</title>
<style>
  /* ---- Brand colors: change these two to match your site ---- */
  :root{
    --accent:#e11d2a;          /* Black Marker red */
    --accent-text:#ffffff;
    --bg:#111315;
    --panel:#1a1d20;
    --panel-2:#22262a;
    --text:#f2f4f6;
    --muted:#9aa3ab;
    --border:#2c3136;
    --radius:14px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text)}
  .chat{
    display:flex;flex-direction:column;height:100%;max-height:100%;
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;
  }
  .chat__head{
    padding:12px 16px;background:var(--panel-2);border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(225,29,42,.6)}70%{box-shadow:0 0 0 8px rgba(225,29,42,0)}100%{box-shadow:0 0 0 0 rgba(225,29,42,0)}}
  .chat__list{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
  .msg{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:8px 11px;line-height:1.35}
  .msg__top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px}
  .msg__name{font-weight:700;color:var(--accent);font-size:13px}
  .msg__time{font-size:11px;color:var(--muted);white-space:nowrap}
  .msg__body{font-size:14px;word-wrap:break-word;overflow-wrap:anywhere}
  .empty{color:var(--muted);text-align:center;margin:auto;font-size:14px}
  .chat__form{display:flex;flex-direction:column;gap:8px;padding:12px;background:var(--panel-2);border-top:1px solid var(--border)}
  .row{display:flex;gap:8px}
  input,textarea,button{font-family:inherit;font-size:14px;border-radius:9px;border:1px solid var(--border);outline:none}
  input,textarea{background:var(--panel);color:var(--text);padding:9px 11px;width:100%;resize:none}
  input:focus,textarea:focus{border-color:var(--accent)}
  #name{flex:0 0 34%}
  #message{flex:1}
  button{background:var(--accent);color:var(--accent-text);border:none;font-weight:700;padding:9px 16px;cursor:pointer;transition:filter .15s}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
  .chat__list::-webkit-scrollbar{width:8px}
  .chat__list::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
</style>
</head>
<body>
  <div class="chat">
    <div class="chat__head"><span class="dot"></span> Live Chat</div>
    <div class="chat__list" id="list"><div class="empty">Loading chat…</div></div>
    <form class="chat__form" id="form" autocomplete="off">
      <div class="row">
        <input id="name" placeholder="Your name" maxlength="40" required>
        <button type="submit" id="send">Send</button>
      </div>
      <textarea id="message" placeholder="Say something…" rows="2" maxlength="300" required></textarea>
      <div class="meta"><span id="status">&nbsp;</span><span id="count">0 / 300</span></div>
    </form>
  </div>

<script>
/* =======================================================================
   CONFIG — paste your Apps Script Web App URL between the quotes below.
   It looks like: https://script.google.com/macros/s/AKfy..../exec
   ======================================================================= */
const CHAT_API = 'PASTE_YOUR_WEB_APP_URL_HERE';

const POLL_MS = 4000;   // how often the widget refreshes (ms)

const listEl   = document.getElementById('list');
const formEl   = document.getElementById('form');
const nameEl   = document.getElementById('name');
const msgEl    = document.getElementById('message');
const sendEl   = document.getElementById('send');
const statusEl = document.getElementById('status');
const countEl  = document.getElementById('count');

// Remember the viewer's name between visits.
nameEl.value = localStorage.getItem('bmchat_name') || '';

msgEl.addEventListener('input', () => { countEl.textContent = msgEl.value.length + ' / 300'; });

/* ---- JSONP read (no CORS headaches) ---- */
function jsonp(url){
  return new Promise((resolve, reject) => {
    const cb = 'bmchat_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 10000);
    function cleanup(){
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('load error')); };
    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(script);
  });
}

function fmtTime(iso){
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
}

function render(messages){
  const nearBottom = listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight < 60;
  if (!messages.length){
    listEl.innerHTML = '<div class="empty">Be the first to say something 👋</div>';
    return;
  }
  listEl.innerHTML = '';
  for (const m of messages){
    const wrap = document.createElement('div'); wrap.className = 'msg';
    const top  = document.createElement('div'); top.className = 'msg__top';
    const name = document.createElement('span'); name.className = 'msg__name'; name.textContent = m.name || 'Guest';
    const time = document.createElement('span'); time.className = 'msg__time'; time.textContent = fmtTime(m.time);
    const body = document.createElement('div'); body.className = 'msg__body'; body.textContent = m.message; // textContent = no XSS
    top.append(name, time); wrap.append(top, body); listEl.append(wrap);
  }
  if (nearBottom) listEl.scrollTop = listEl.scrollHeight;
}

async function refresh(){
  if (CHAT_API.includes('PASTE_YOUR')){ statusEl.textContent = 'Not configured — add your Web App URL.'; return; }
  try { render(await jsonp(CHAT_API)); statusEl.textContent = ' '; }
  catch(e){ statusEl.textContent = 'Reconnecting…'; }
}

formEl.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = nameEl.value.trim() || 'Guest';
  const message = msgEl.value.trim();
  if (!message) return;
  localStorage.setItem('bmchat_name', name);
  sendEl.disabled = true; statusEl.textContent = 'Sending…';
  try {
    await fetch(CHAT_API, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ name, message })
    });
    msgEl.value = ''; countEl.textContent = '0 / 300';
    setTimeout(refresh, 700);           // let the sheet catch up, then show it
    statusEl.textContent = ' ';
  } catch(err){
    statusEl.textContent = 'Send failed — try again.';
  } finally {
    sendEl.disabled = false; msgEl.focus();
  }
});

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
